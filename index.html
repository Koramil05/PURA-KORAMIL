<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kas Pura - Koramil Sukasada</title>
    
    <!-- PWA CONFIG -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a237e">
    
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a237e;
            --primary-dark: #0d1560;
            --accent: #f5b342;
            --success: #2e7d32;
            --danger: #c62828;
            --warning: #f57c00;
            --purple: #7b1fa2;
            --info: #0288d1;
            --bg: #0a192f;
            --text: #ffffff;
            --text-dim: #90a4ae;
            --card-bg: rgba(26, 35, 70, 0.95);
            --border: rgba(255, 215, 140, 0.25);
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 2px solid var(--accent);
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header h1 i { color: var(--accent); }
        
        .header-actions { display: flex; gap: 8px; }
        
        .header-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .header-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }
        
        /* BOTTOM NAV */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--primary);
            display: flex;
            border-top: 2px solid var(--accent);
            z-index: 100;
        }
        
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn i { font-size: 1.2rem; }
        .nav-btn.active { color: var(--accent); background: rgba(245,180,65,0.1); }
        
        /* CONTENT */
        .content {
            position: fixed;
            top: 60px;
            bottom: 60px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 16px;
        }
        
        /* CARD */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(5px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .card-header h3 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-header h3 i { color: var(--accent); }
        
        /* BALANCE CARD */
        .balance-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .balance-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .balance-value {
            color: var(--accent);
            font-size: 2.2rem;
            font-weight: 700;
            margin: 8px 0;
        }
        
        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stats-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid;
        }
        
        .stat-card.income { border-left-color: var(--success); }
        .stat-card.expense { border-left-color: var(--danger); }
        .stat-card.purple { border-left-color: var(--purple); }
        .stat-card.info { border-left-color: var(--info); }
        
        .stat-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        /* TABLE */
        .table-container {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        th {
            background: var(--primary);
            color: white;
            padding: 10px;
            position: sticky;
            top: 0;
            font-size: 0.85rem;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        
        /* BADGE */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .badge.setor { background: rgba(46,125,80,0.2); color: #81c784; }
        .badge.pengeluaran { background: rgba(198,40,40,0.2); color: #ef5350; }
        .badge.donasi { background: rgba(123,31,162,0.2); color: #ce93d8; }
        
        /* FORM */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }
        
        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-setor { background: linear-gradient(135deg, #2e7d32, #4caf50); }
        .btn-pengeluaran { background: linear-gradient(135deg, #c62828, #f44336); }
        .btn-donasi { background: linear-gradient(135deg, #7b1fa2, #9c27b0); }
        
        /* SEARCH */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            top: 12px;
            color: var(--text-dim);
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: white;
        }
        
        /* MODAL */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            border: 2px solid var(--accent);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* TOAST */
        .toast {
            position: fixed;
            top: 70px;
            right: 16px;
            background: var(--success);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        
        .toast.error { background: var(--danger); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* UTILITY */
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-positive { color: #81c784; }
        .text-negative { color: #ff8a80; }
        .text-purple { color: #ce93d8; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-temple"></i> Kas Pura Koramil</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i></button>
            <button class="header-btn" onclick="cetakLaporan()"><i class="fas fa-print"></i></button>
        </div>
    </div>

    <div class="content" id="content">
        <div class="text-center" style="padding: 60px 20px;">
            <div class="loading-spinner" style="border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            <div class="mt-2" style="color: var(--text-dim);">Memuat aplikasi...</div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="ubahTab('dashboard')"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
        <button class="nav-btn" onclick="ubahTab('transaksi')"><i class="fas fa-exchange-alt"></i><span>Transaksi</span></button>
        <button class="nav-btn" onclick="ubahTab('anggota')"><i class="fas fa-users"></i><span>Anggota</span></button>
        <button class="nav-btn" onclick="ubahTab('donasi')"><i class="fas fa-hand-holding-heart"></i><span>Donasi</span></button>
    </div>

    <!-- MODAL TAMBAH ANGGOTA -->
    <div id="modalAnggota" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> Tambah Anggota</h3>
                <button class="modal-close" onclick="tutupModal('modalAnggota')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="namaAnggota" class="form-control" placeholder="Nama lengkap">
                </div>
                <div class="form-group">
                    <label>Pangkat</label>
                    <input type="text" id="pangkatAnggota" class="form-control" placeholder="Contoh: Kapten Inf">
                </div>
                <div class="form-group">
                    <label>No HP</label>
                    <input type="text" id="hpAnggota" class="form-control" placeholder="08123456789">
                </div>
                <div class="form-group">
                    <label>Alamat</label>
                    <textarea id="alamatAnggota" class="form-control" rows="2" placeholder="Alamat"></textarea>
                </div>
                <button class="btn" onclick="simpanAnggota()">SIMPAN</button>
            </div>
        </div>
    </div>

    <!-- MODAL DONASI -->
    <div id="modalDonasi" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-hand-holding-heart"></i> Tambah Donasi</h3>
                <button class="modal-close" onclick="tutupModal('modalDonasi')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Jenis Donasi</label>
                    <select id="jenisDonasi" class="form-control" onchange="toggleJenisDonasi()">
                        <option value="UANG">💰 Donasi Uang</option>
                        <option value="BARANG">📦 Donasi Barang</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nama Donatur</label>
                    <input type="text" id="namaDonatur" class="form-control" placeholder="Nama donatur">
                </div>
                <div class="form-group" id="fieldDonasiUang">
                    <label>Jumlah Donasi (Rp)</label>
                    <input type="text" id="jumlahDonasi" class="form-control" placeholder="0" onkeyup="formatUang(this)">
                </div>
                <div class="form-group hidden" id="fieldDonasiBarang">
                    <label>Nama Barang</label>
                    <input type="text" id="barangDonasi" class="form-control" placeholder="Contoh: Beras 5kg">
                </div>
                <div class="form-group">
                    <label>Alamat</label>
                    <input type="text" id="alamatDonatur" class="form-control" placeholder="Alamat donatur">
                </div>
                <div class="form-group">
                    <label>Keterangan</label>
                    <textarea id="keteranganDonasi" class="form-control" rows="2" placeholder="Opsional"></textarea>
                </div>
                <button class="btn btn-donasi" onclick="simpanDonasi()">SIMPAN DONASI</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== KONFIGURASI ====================
        const API_URL = 'https://script.google.com/macros/s/AKfycbytsI_OZavWyoy08FvvZT_1jIR7HrAUGW1jwd54HnBjma6oE_4ppfthFLv1A9VwoNVr/exec';
        
        // ==================== STATE ====================
        let state = {
            tab: 'dashboard',
            anggota: [],
            transaksi: [],
            donasi: [],
            stats: {
                totalSetor: 0,
                totalPengeluaran: 0,
                totalDonasiUang: 0,
                totalDonasiBarang: 0
            },
            globalBalance: 0
        };

        let anggotaList = []; // Untuk dropdown

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // ==================== LOAD DATA ====================
        async function loadData() {
            try {
                showLoading();
                
                // Load anggota
                const anggotaRes = await fetch(API_URL + '?action=getAnggota');
                const anggotaData = await anggotaRes.json();
                if (anggotaData.success) {
                    state.anggota = anggotaData.data || [];
                    anggotaList = state.anggota;
                }
                
                // Load transaksi
                const transaksiRes = await fetch(API_URL + '?action=getTransaksi&limit=1000');
                const transaksiData = await transaksiRes.json();
                if (transaksiData.success) {
                    state.transaksi = transaksiData.data || [];
                }
                
                // Load donasi
                const donasiRes = await fetch(API_URL + '?action=getDonasi&limit=1000');
                const donasiData = await donasiRes.json();
                if (donasiData.success) {
                    state.donasi = donasiData.data || [];
                }
                
                hitungStatistik();
                renderTab();
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Gagal memuat data: ' + error.message, true);
                // Fallback ke data dummy
                state.anggota = [
                    { id: 'AG001', nama: 'Kapten Inf I Nyoman Arya Kepakisan', pangkat: 'Kapten Inf', status: 'AKTIF' },
                    { id: 'AG002', nama: 'Peltu I Nyoman Wilmana', pangkat: 'Peltu', status: 'AKTIF' }
                ];
                anggotaList = state.anggota;
                renderTab();
            }
        }

        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="text-center" style="padding: 60px 20px;">
                    <div style="border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                    <div class="mt-2" style="color: var(--text-dim);">Memuat data...</div>
                </div>
            `;
        }

        function hitungStatistik() {
            let totalSetor = 0, totalPengeluaran = 0, totalDonasiUang = 0, totalDonasiBarang = 0;
            
            (state.transaksi || []).forEach(t => {
                if (t.jenis === 'SETOR') totalSetor += Number(t.nominal) || 0;
                if (t.jenis === 'PENGELUARAN') totalPengeluaran += Number(t.nominal) || 0;
            });
            
            (state.donasi || []).forEach(d => {
                if (d.jenis === 'UANG') totalDonasiUang += Number(d.nominal) || 0;
                if (d.jenis === 'BARANG') totalDonasiBarang++;
            });
            
            state.stats = { totalSetor, totalPengeluaran, totalDonasiUang, totalDonasiBarang };
            state.globalBalance = totalSetor + totalDonasiUang - totalPengeluaran;
        }

        // ==================== FUNGSI BANTU ====================
        function formatRupiah(angka) {
            if (angka === undefined || angka === null) angka = 0;
            return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function formatTanggal(tgl) {
            if (!tgl) return '-';
            try {
                const d = new Date(tgl);
                return d.toLocaleDateString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric' });
            } catch { return '-'; }
        }

        function formatTanggalLengkap(tgl) {
            if (!tgl) return '-';
            try {
                const d = new Date(tgl);
                const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
                const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
                return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            } catch { return '-'; }
        }

        function formatUang(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val) {
                input.value = parseInt(val).toLocaleString('id-ID');
            }
        }

        function parseRupiah(rupiah) {
            if (!rupiah) return 0;
            return parseInt(rupiah.toString().replace(/[^0-9]/g, '')) || 0;
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function bukaModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }

        function tutupModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // ==================== TAB ====================
        function ubahTab(tab) {
            state.tab = tab;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.textContent.includes(tab)) btn.classList.add('active');
            });
            renderTab();
        }

        function renderTab() {
            if (state.tab === 'dashboard') renderDashboard();
            else if (state.tab === 'transaksi') renderTransaksi();
            else if (state.tab === 'anggota') renderAnggota();
            else if (state.tab === 'donasi') renderDonasi();
        }

        // ==================== DASHBOARD ====================
        function renderDashboard() {
            const totalPemasukan = state.stats.totalSetor + state.stats.totalDonasiUang;
            const totalPengeluaran = state.stats.totalPengeluaran;
            
            // Gabungkan transaksi dan donasi
            const semuaTransaksi = [];
            
            (state.transaksi || []).forEach(t => {
                semuaTransaksi.push({
                    ...t,
                    tipe: 'transaksi',
                    namaTampil: t.nama,
                    nilaiTampil: formatRupiah(t.nominal),
                    kelasWarna: t.jenis === 'PENGELUARAN' ? 'text-negative' : 'text-positive',
                    badge: t.jenis === 'SETOR' ? 'setor' : 'pengeluaran'
                });
            });
            
            (state.donasi || []).forEach(d => {
                semuaTransaksi.push({
                    timestamp: d.timestamp,
                    jenis: d.jenis === 'UANG' ? 'DONASI' : 'DONASI BARANG',
                    namaTampil: d.namaDonatur,
                    nilaiTampil: d.jenis === 'UANG' ? formatRupiah(d.nominal) : d.barang,
                    kelasWarna: 'text-purple',
                    badge: 'donasi'
                });
            });
            
            semuaTransaksi.sort((a, b) => {
                const da = new Date(a.timestamp || 0);
                const db = new Date(b.timestamp || 0);
                return db - da;
            });
            
            const recent = semuaTransaksi.slice(0, 10);

            let html = `
                <div class="balance-card">
                    <div class="balance-label">SALDO GLOBAL</div>
                    <div class="balance-value">${formatRupiah(state.globalBalance)}</div>
                    <div class="flex-between">
                        <span>👥 ${state.anggota.length} Anggota</span>
                        <span>📊 ${state.transaksi.length} Transaksi</span>
                        <span>🎁 ${state.donasi.length} Donasi</span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card income">
                        <div class="stat-label">Total Pemasukan</div>
                        <div class="stat-value text-positive">${formatRupiah(totalPemasukan)}</div>
                    </div>
                    <div class="stat-card expense">
                        <div class="stat-label">Total Pengeluaran</div>
                        <div class="stat-value text-negative">${formatRupiah(totalPengeluaran)}</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-history"></i> Transaksi Terbaru</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Nama</th>
                                    <th>Jenis</th>
                                    <th>Nominal</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            let html = `

        // ==================== FUNGSI FORM ====================
        window.toggleFormTransaksi = function() {
            const jenis = document.getElementById('jenisTransaksi').value;
            document.getElementById('formSetor').classList.add('hidden');
            document.getElementById('formPengeluaran').classList.add('hidden');
            
            if (jenis === 'SETOR') {
                document.getElementById('formSetor').classList.remove('hidden');
            } else if (jenis === 'PENGELUARAN') {
                document.getElementById('formPengeluaran').classList.remove('hidden');
            }
        };

        window.toggleJenisDonasi = function() {
            const jenis = document.getElementById('jenisDonasi').value;
            const uangField = document.getElementById('fieldDonasiUang');
            const barangField = document.getElementById('fieldDonasiBarang');
            
            if (uangField && barangField) {
                if (jenis === 'UANG') {
                    uangField.classList.remove('hidden');
                    barangField.classList.add('hidden');
                } else {
                    uangField.classList.add('hidden');
                    barangField.classList.remove('hidden');
                }
            }
        };

        window.filterAnggota = function() {
            const keyword = document.getElementById('searchAnggota').value.toLowerCase();
            document.querySelectorAll('.anggota-row').forEach(row => {
                const nama = row.dataset.nama || '';
                row.style.display = nama.includes(keyword) ? '' : 'none';
            });
        };

        // ==================== SIMPAN DATA ====================
        window.simpanTransaksi = async function() {
            const anggotaVal = document.getElementById('pilihAnggotaTransaksi').value;
            const jenis = document.getElementById('jenisTransaksi').value;
            const keterangan = document.getElementById('keteranganTransaksi')?.value || '';
            
            if (!anggotaVal) { showToast('Pilih anggota', true); return; }
            if (!jenis) { showToast('Pilih jenis transaksi', true); return; }
            
            const [idAnggota, nama] = anggotaVal.split('|');
            let nominal = 0;
            
            if (jenis === 'SETOR') {
                nominal = parseRupiah(document.getElementById('jumlahSetor')?.value);
                if (nominal <= 0) { showToast('Jumlah setor harus diisi', true); return; }
            } else {
                const namaPengeluaran = document.getElementById('namaPengeluaran')?.value.trim();
                if (!namaPengeluaran) { showToast('Nama pengeluaran harus diisi', true); return; }
                nominal = parseRupiah(document.getElementById('jumlahPengeluaran')?.value);
                if (nominal <= 0) { showToast('Jumlah harus diisi', true); return; }
            }
            
            const now = new Date();
            const transaksiBaru = {
                idTransaksi: 'TRX' + Date.now(),
                timestamp: now.toISOString(),
                tanggal: now.toISOString().split('T')[0],
                jenis: jenis,
                idAnggota: idAnggota,
                nama: nama,
                nominal: nominal,
                keterangan: keterangan,
                bulan: now.getMonth() + 1,
                tahun: now.getFullYear()
            };
            
            try {
                showToast('Menyimpan...');
                
                const params = new URLSearchParams({
                    action: 'saveTransaksi',
                    ...transaksiBaru
                });
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('Transaksi disimpan');
                    await loadData();
                } else {
                    showToast('Gagal: ' + (result.message || 'Unknown error'), true);
                }
            } catch (error) {
                console.error(error);
                showToast('Gagal menyimpan', true);
            }
        };

        window.simpanAnggota = async function() {
            const nama = document.getElementById('namaAnggota')?.value.trim();
            if (!nama) { showToast('Nama harus diisi', true); return; }
            
            const now = new Date();
            const anggotaBaru = {
                id: 'AG' + Date.now().toString().slice(-6),
                nama: nama,
                pangkat: document.getElementById('pangkatAnggota')?.value.trim() || '-',
                no_hp: document.getElementById('hpAnggota')?.value.trim() || '-',
                alamat: document.getElementById('alamatAnggota')?.value.trim() || '-',
                status: 'AKTIF',
                tanggalDaftar: now.toISOString(),
                lastUpdate: now.toISOString()
            };
            
            try {
                showToast('Menyimpan...');
                
                const params = new URLSearchParams({
                    action: 'saveAnggota',
                    ...anggotaBaru
                });
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('Anggota ditambahkan');
                    tutupModal('modalAnggota');
                    await loadData();
                } else {
                    showToast('Gagal: ' + (result.message || 'Unknown error'), true);
                }
            } catch (error) {
                console.error(error);
                showToast('Gagal menyimpan', true);
            }
        };

        window.simpanDonasi = async function() {
            const jenis = document.getElementById('jenisDonasi')?.value;
            const namaDonatur = document.getElementById('namaDonatur')?.value.trim();
            
            if (!namaDonatur) { showToast('Nama donatur harus diisi', true); return; }
            
            const now = new Date();
            const donasiBaru = {
                id: 'DNS' + Date.now(),
                timestamp: now.toISOString(),
                tanggal: now.toISOString().split('T')[0],
                jenis: jenis,
                namaDonatur: namaDonatur,
                alamat: document.getElementById('alamatDonatur')?.value.trim() || '-',
                keterangan: document.getElementById('keteranganDonasi')?.value.trim() || '-',
                bulan: now.getMonth() + 1,
                tahun: now.getFullYear()
            };
            
            if (jenis === 'UANG') {
                donasiBaru.nominal = parseRupiah(document.getElementById('jumlahDonasi')?.value);
                donasiBaru.barang = '';
                if (donasiBaru.nominal <= 0) { showToast('Jumlah donasi harus diisi', true); return; }
            } else {
                donasiBaru.barang = document.getElementById('barangDonasi')?.value.trim();
                donasiBaru.nominal = 0;
                if (!donasiBaru.barang) { showToast('Nama barang harus diisi', true); return; }
            }
            
            try {
                showToast('Menyimpan...');
                
                const params = new URLSearchParams({
                    action: 'saveDonasi',
                    ...donasiBaru
                });
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('Donasi disimpan');
                    tutupModal('modalDonasi');
                    await loadData();
                } else {
                    showToast('Gagal: ' + (result.message || 'Unknown error'), true);
                }
            } catch (error) {
                console.error(error);
                showToast('Gagal menyimpan', true);
            }
        };

        window.refreshData = function() {
