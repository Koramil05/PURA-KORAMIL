<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kas Pura - Buku Kas</title>
    
    <!-- PWA Assets -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/Koramil05/PURA05/main/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/Koramil05/PURA05/main/favicon-32x32.png">
    <link rel="manifest" href="https://raw.githubusercontent.com/Koramil05/PURA05/main/site.webmanifest">
    <meta name="theme-color" content="#1a237e">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1a237e;
            --primary-dark: #0d1560;
            --accent: #f5b342;
            --success: #2e7d32;
            --danger: #c62828;
            --warning: #f57c00;
            --purple: #7b1fa2;
            --bg: #0a192f;
            --text: #ffffff;
            --text-dim: #90a4ae;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        /* ===== HEADER ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i { color: var(--accent); }
        
        .header-actions { display: flex; gap: 10px; }
        
        .header-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        /* ===== BOTTOM NAV ===== */
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--primary);
            display: flex;
            border-top: 2px solid var(--accent);
            z-index: 100;
        }
        
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            gap: 4px;
            cursor: pointer;
        }
        
        .nav-btn i { font-size: 1.2rem; }
        
        .nav-btn.active {
            color: var(--accent);
            background: rgba(245,180,65,0.1);
        }
        
        /* ===== CONTENT ===== */
        .content {
            position: fixed;
            top: 60px;
            bottom: 60px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 16px;
        }
        
        /* ===== CARD ===== */
        .card {
            background: rgba(26,35,70,0.95);
            border: 1px solid rgba(255,215,140,0.25);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,215,140,0.25);
        }
        
        .card-header h3 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-header h3 i { color: var(--accent); }
        
        /* ===== INFO CARD ===== */
        .info-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .info-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        
        .info-value {
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        /* ===== BUTTONS ===== */
        .aksi-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .aksi-btn {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: white;
        }
        
        .aksi-btn.setor { background: var(--success); }
        .aksi-btn.pengeluaran { background: var(--warning); }
        .aksi-btn.donasi { background: var(--purple); }
        .aksi-btn.active { border: 2px solid var(--accent); }
        
        .btn-simpan {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--primary-dark);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .btn-batal {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: white;
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        
        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,215,140,0.25);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }
        
        /* ===== TABLE ===== */
        .table-container {
            overflow-x: auto;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        th {
            background: var(--primary);
            color: white;
            padding: 10px;
            position: sticky;
            top: 0;
            font-size: 0.8rem;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }
        
        /* ===== BADGE ===== */
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .badge.setor { background: rgba(46,125,80,0.2); color: #81c784; }
        .badge.pengeluaran { background: rgba(245,124,0,0.2); color: #ffb74d; }
        .badge.donasi-uang { background: rgba(46,125,80,0.2); color: #81c784; }
        .badge.donasi-barang { background: rgba(2,136,209,0.2); color: #90caf9; }
        
        /* ===== SEARCH ===== */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }
        
        .search-box i {
            position: absolute;
            left: 12px;
            top: 12px;
            color: var(--text-dim);
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,215,140,0.25);
            border-radius: 8px;
            color: white;
        }
        
        /* ===== MODAL ===== */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-content {
            background: rgba(26,35,70,0.95);
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            padding: 20px;
            border: 2px solid var(--accent);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--primary-dark);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            top: 70px;
            right: 16px;
            background: var(--success);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        
        .toast.error { background: var(--danger); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* ===== UTILITY ===== */
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-positive { color: #81c784; }
        .text-negative { color: #ff8a80; }
        .text-purple { color: #ce93d8; }
        .text-dim { color: var(--text-dim); }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-temple"></i> Kas Pura</h1>
        <div class="header-actions">
            <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
            <button class="header-btn" id="printBtn"><i class="fas fa-print"></i></button>
        </div>
    </div>

    <div class="content" id="content"></div>

    <div class="nav">
        <button class="nav-btn" data-tab="buku"><i class="fas fa-book"></i><span>Buku</span></button>
        <button class="nav-btn" data-tab="input"><i class="fas fa-pen"></i><span>Input</span></button>
        <button class="nav-btn active" data-tab="anggota"><i class="fas fa-users"></i><span>Anggota</span></button>
    </div>

    <script>
        // ==================== STATE ====================
        let state = {
            tab: 'anggota',
            transaksi: [],
            anggota: []
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tab = e.currentTarget.dataset.tab;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    state.tab = tab;
                    renderTab();
                });
            });

            document.getElementById('refreshBtn').addEventListener('click', () => {
                loadData();
                showToast('Data dimuat ulang');
            });

            document.getElementById('printBtn').addEventListener('click', () => {
                cetakLaporan();
            });
            
            renderTab();
        });

        // ==================== LOAD DATA ====================
        function loadData() {
            try {
                const saved = localStorage.getItem('kasPuraData');
                if (saved) {
                    const data = JSON.parse(saved);
                    state.transaksi = data.transaksi || [];
                    state.anggota = data.anggota || [];
                }
            } catch (e) {
                state.transaksi = [];
                state.anggota = [];
            }
        }

        function saveData() {
            localStorage.setItem('kasPuraData', JSON.stringify({
                transaksi: state.transaksi,
                anggota: state.anggota
            }));
        }

        function getGlobalBalance() {
            let balance = 0;
            state.transaksi.forEach(t => {
                if (t.jenis === 'SETOR' || t.jenis === 'DONASI_UANG') balance += t.nominal || 0;
                if (t.jenis === 'PENGELUARAN') balance -= t.nominal || 0;
            });
            return balance;
        }

        function formatRupiah(angka) {
            return 'Rp ' + (angka || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function formatTanggal(tgl) {
            if (!tgl) return '-';
            try {
                const d = new Date(tgl);
                return d.toLocaleDateString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
            } catch { return '-'; }
        }

        function formatRupiahInput(angka) {
            return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function parseRupiah(rupiah) {
            return parseInt(rupiah.replace(/[^0-9]/g, '')) || 0;
        }

        function generateIdAnggota() {
            const lastId = state.anggota
                .map(a => parseInt(a.id?.replace('AG', '')) || 0)
                .reduce((max, curr) => Math.max(max, curr), 0);
            return 'AG' + (lastId + 1).toString().padStart(3, '0');
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ==================== RENDER ====================
        function renderTab() {
            if (state.tab === 'anggota') renderAnggota();
            else if (state.tab === 'buku') renderBuku();
            else if (state.tab === 'input') renderInput();
        }

        function renderAnggota() {
            let html = `
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-users"></i> Daftar Anggota</h3>
                    </div>
                    
                    <button class="btn-simpan" onclick="tambahAnggota()" style="margin-bottom:16px">
                        <i class="fas fa-plus"></i> TAMBAH ANGGOTA
                    </button>
                    
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Nama</th><th>Alamat</th><th>No HP</th></tr>
                            </thead>
                            <tbody>
            `;
            
            if (state.anggota.length === 0) {
                html += '<tr><td colspan="4" class="text-center" style="padding:30px;">Belum ada anggota</td></tr>';
            } else {
                state.anggota.forEach(a => {
                    html += `<tr><td>${a.id}</td><td>${a.nama}</td><td>${a.alamat || '-'}</td><td>${a.no_hp || '-'}</td></tr>`;
                });
            }
            
            html += `</tbody></table></div></div>`;
            document.getElementById('content').innerHTML = html;
        }

        function renderBuku() {
            let html = `
                <div class="info-card">
                    <div class="flex-between">
                        <div><div class="info-label">Saldo</div><div class="info-value">${formatRupiah(getGlobalBalance())}</div></div>
                        <div><div class="info-label">Transaksi</div><div class="info-value">${state.transaksi.length}</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-book"></i> Buku Kas</h3></div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>No</th><th>Waktu</th><th>ID</th><th>Nama</th><th>Jenis</th><th>Nominal</th><th>Keterangan</th></tr></thead>
                            <tbody>
            `;
            
            if (state.transaksi.length === 0) {
                html += '<tr><td colspan="7" class="text-center" style="padding:30px;">Belum ada transaksi</td></tr>';
            } else {
                [...state.transaksi].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach((t, i) => {
                    let badge = t.jenis === 'SETOR' ? 'setor' : 
                                t.jenis === 'PENGELUARAN' ? 'pengeluaran' :
                                t.jenis === 'DONASI_UANG' ? 'donasi-uang' : 'donasi-barang';
                    let textClass = t.jenis === 'PENGELUARAN' ? 'text-negative' : 'text-positive';
                    let display = t.jenis === 'DONASI_BARANG' ? t.barang : formatRupiah(t.nominal);
                    
                    html += `<tr>
                        <td>${i+1}</td>
                        <td>${formatTanggal(t.timestamp)}</td>
                        <td>${t.id_nasabah || '-'}</td>
                        <td>${t.nama}</td>
                        <td><span class="badge ${badge}">${t.jenis.replace('_',' ')}</span></td>
                        <td class="${textClass}">${display}</td>
                        <td>${t.keterangan || '-'}</td>
                    </tr>`;
                });
            }
            
            html += `</tbody></table></div></div>`;
            document.getElementById('content').innerHTML = html;
        }

        function renderInput() {
            let html = `
                <div class="card">
                    <h3 style="margin-bottom:16px">Input Transaksi</h3>
                    <div class="aksi-buttons">
                        <button class="aksi-btn setor" onclick="pilihAksi('SETOR', this)">SETOR</button>
                        <button class="aksi-btn pengeluaran" onclick="pilihAksi('PENGELUARAN', this)">PENGELUARAN</button>
                        <button class="aksi-btn donasi" onclick="pilihAksi('DONASI', this)">DONASI</button>
                    </div>
                    <div id="formContainer"></div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            pilihAksi('SETOR', document.querySelector('.aksi-btn.setor'));
        }

        window.pilihAksi = function(aksi, el) {
            document.querySelectorAll('.aksi-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
            
            let formHtml = '';
            
            if (aksi === 'SETOR') {
                let options = '<option value="">-- Pilih Anggota --</option>';
                state.anggota.forEach(a => options += `<option value="${a.id}|${a.nama}">${a.id} - ${a.nama}</option>`);
                
                formHtml = `
                    <div class="form-group"><label>Pilih Anggota</label><select class="form-control" id="pilihAnggota">${options}</select></div>
                    <div class="form-group"><label>Jumlah (Rp)</label><input type="text" class="form-control" id="jumlahSetor" onkeyup="formatUang(this)"></div>
                    <div class="form-group"><label>Keterangan</label><textarea class="form-control" id="keterangan" rows="2"></textarea></div>
                `;
            } else if (aksi === 'PENGELUARAN') {
                formHtml = `
                    <div class="form-group"><label>Nama Pengeluaran</label><input type="text" class="form-control" id="namaPengeluaran"></div>
                    <div class="form-group"><label>Jumlah (Rp)</label><input type="text" class="form-control" id="jumlahPengeluaran" onkeyup="formatUang(this)"></div>
                    <div class="form-group"><label>Keterangan</label><textarea class="form-control" id="keterangan" rows="2"></textarea></div>
                `;
            } else if (aksi === 'DONASI') {
                formHtml = `
                    <div class="form-group"><label>Nama Donatur</label><input type="text" class="form-control" id="namaDonatur"></div>
                    <div class="form-group"><label>Jenis</label>
                        <select class="form-control" id="jenisDonasi" onchange="toggleDonasi()">
                            <option value="UANG">Donasi Uang</option>
                            <option value="BARANG">Donasi Barang</option>
                        </select>
                    </div>
                    <div class="form-group" id="donasiUangField"><label>Jumlah (Rp)</label><input type="text" class="form-control" id="jumlahDonasi" onkeyup="formatUang(this)"></div>
                    <div class="form-group hidden" id="donasiBarangField"><label>Nama Barang</label><input type="text" class="form-control" id="namaBarang"></div>
                    <div class="form-group"><label>Keterangan</label><textarea class="form-control" id="keterangan" rows="2"></textarea></div>
                `;
            }
            
            formHtml += `<button class="btn-simpan" onclick="simpanTransaksi('${aksi}')">SIMPAN</button>`;
            formHtml += `<button class="btn-batal" onclick="state.tab='buku'; renderTab()">BATAL</button>`;
            
            document.getElementById('formContainer').innerHTML = formHtml;
            if (aksi === 'DONASI') toggleDonasi();
        };

        window.formatUang = function(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            input.value = val ? formatRupiahInput(parseInt(val)) : '';
        };

        window.toggleDonasi = function() {
            let jenis = document.getElementById('jenisDonasi')?.value;
            let uang = document.getElementById('donasiUangField');
            let barang = document.getElementById('donasiBarangField');
            if (uang && barang) {
                if (jenis === 'UANG') {
                    uang.classList.remove('hidden');
                    barang.classList.add('hidden');
                } else {
                    uang.classList.add('hidden');
                    barang.classList.remove('hidden');
                }
            }
        };

        window.simpanTransaksi = function(aksi) {
            let idNasabah = '', nama = '', nominal = 0, barang = '', keterangan = '';
            
            if (aksi === 'SETOR') {
                let val = document.getElementById('pilihAnggota')?.value;
                if (!val) { showToast('Pilih anggota', true); return; }
                [idNasabah, nama] = val.split('|');
                nominal = parseRupiah(document.getElementById('jumlahSetor')?.value || '0');
                if (nominal <= 0) { showToast('Jumlah harus diisi', true); return; }
                keterangan = document.getElementById('keterangan')?.value || '';
                
                state.transaksi.push({
                    timestamp: new Date().toISOString(),
                    id_nasabah: idNasabah,
                    nama: nama,
                    jenis: 'SETOR',
                    nominal: nominal,
                    keterangan: keterangan
                });
            }
            else if (aksi === 'PENGELUARAN') {
                nama = document.getElementById('namaPengeluaran')?.value.trim();
                if (!nama) { showToast('Nama harus diisi', true); return; }
                nominal = parseRupiah(document.getElementById('jumlahPengeluaran')?.value || '0');
                if (nominal <= 0) { showToast('Jumlah harus diisi', true); return; }
                keterangan = document.getElementById('keterangan')?.value || '';
                
                state.transaksi.push({
                    timestamp: new Date().toISOString(),
                    nama: nama,
                    jenis: 'PENGELUARAN',
                    nominal: nominal,
                    keterangan: keterangan
                });
            }
            else if (aksi === 'DONASI') {
                nama = document.getElementById('namaDonatur')?.value.trim();
                if (!nama) { showToast('Nama donatur harus diisi', true); return; }
                let jenis = document.getElementById('jenisDonasi')?.value;
                keterangan = document.getElementById('keterangan')?.value || '';
                
                if (jenis === 'UANG') {
                    nominal = parseRupiah(document.getElementById('jumlahDonasi')?.value || '0');
                    if (nominal <= 0) { showToast('Jumlah harus diisi', true); return; }
                    state.transaksi.push({
                        timestamp: new Date().toISOString(),
                        nama: nama,
                        jenis: 'DONASI_UANG',
                        nominal: nominal,
                        keterangan: keterangan
                    });
                } else {
                    barang = document.getElementById('namaBarang')?.value.trim();
                    if (!barang) { showToast('Nama barang harus diisi', true); return; }
                    state.transaksi.push({
                        timestamp: new Date().toISOString(),
                        nama: nama,
                        jenis: 'DONASI_BARANG',
                        barang: barang,
                        keterangan: keterangan
                    });
                }
            }
            
            saveData();
            showToast('Transaksi disimpan');
            state.tab = 'buku';
            renderTab();
        };

        window.tambahAnggota = function() {
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Tambah Anggota</h3>
                        <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group"><label>Nama Lengkap</label><input type="text" class="form-control" id="namaAnggota"></div>
                        <div class="form-group"><label>Alamat</label><input type="text" class="form-control" id="alamatAnggota"></div>
                        <div class="form-group"><label>No HP</label><input type="text" class="form-control" id="noHpAnggota"></div>
                        <button class="modal-btn" onclick="simpanAnggota()">SIMPAN</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.simpanAnggota = function() {
            let nama = document.getElementById('namaAnggota')?.value.trim();
            if (!nama) { showToast('Nama harus diisi', true); return; }
            
            state.anggota.push({
                id: generateIdAnggota(),
                nama: nama,
                alamat: document.getElementById('alamatAnggota')?.value.trim() || '',
                no_hp: document.getElementById('noHpAnggota')?.value.trim() || ''
            });
            
            saveData();
            document.querySelector('.modal')?.remove();
            showToast('Anggota ditambahkan');
            renderAnggota();
        };

        function cetakLaporan() {
            let w = window.open('', '_blank');
            let totalSetor = state.transaksi.filter(t => t.jenis === 'SETOR' || t.jenis === 'DONASI_UANG').reduce((a,b) => a + (b.nominal||0), 0);
            let totalKeluar = state.transaksi.filter(t => t.jenis === 'PENGELUARAN').reduce((a,b) => a + (b.nominal||0), 0);
            
            w.document.write(`
                <html><head><title>Laporan Kas Pura</title>
                <style>body{font-family:Times New Roman;padding:20px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #000;padding:8px} .kop{text-align:center;border-bottom:2px solid #1a237e;margin-bottom:20px}</style>
                </head><body>
                <div class="kop"><h1>LAPORAN KAS PURA</h1><h3>Koramil Sukasada</h3><p>${new Date().toLocaleDateString('id-ID')}</p></div>
                <p>Saldo: ${formatRupiah(getGlobalBalance())}</p>
                <p>Total Setor: ${formatRupiah(totalSetor)}</p>
                <p>Total Pengeluaran: ${formatRupiah(totalKeluar)}</p>
                <table><tr><th>No</th><th>Tanggal</th><th>Jenis</th><th>Nama</th><th>Nominal</th><th>Keterangan</th></tr>
                ${state.transaksi.map((t,i) => `<tr><td>${i+1}</td><td>${formatTanggal(t.timestamp)}</td><td>${t.jenis}</td><td>${t.nama}</td><td>${t.jenis==='DONASI_BARANG'?t.barang:formatRupiah(t.nominal)}</td><td>${t.keterangan||'-'}</td></tr>`).join('')}
                </table></body></html>
            `);
            w.document.close();
            w.print();
        }
    </script>
</body>
</html>
