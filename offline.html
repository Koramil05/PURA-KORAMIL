<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Aplikasi Kas</title>
    <meta name="theme-color" content="#1a237e">
    <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/Koramil05/PURA05/main/favicon-32x32.png">
    <style>
        body {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a22 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .offline-container {
            max-width: 400px;
            background: rgba(20, 30, 38, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .icon { font-size: 48px; color: #ff9800; margin-bottom: 20px; }
        h1 { font-size: 26px; margin-bottom: 10px; color: #ff9800; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📡</div>
        <h1>Mode Offline</h1>
        <p>Koneksi internet tidak tersedia. Silakan coba lagi saat koneksi pulih.</p>
        <button class="btn" onclick="window.location.reload()">🔄 Coba Lagi</button>
    </div>
    <script>
        window.addEventListener('online', () => { window.location.href = '/'; });
    </script>
</body>
</html>
